<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agenda</title>
</head>
<body>
<a href="/logout">logout</a>
<h1>Agenda</h1>
<a href="/agenda/evento">Eventos</a>
<ul>
        {% for eventos in eventos %}
<li>{{ eventos.id }}-{{ eventos.titulo }} - {{  eventos.data_criacao }}

</li>
        {% endfor %}
</ul>
</body>
</html>
